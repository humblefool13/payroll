[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
test    = "test"
script  = "script"

solc    = "0.8.35"
evm_version = "prague"

optimizer       = true
optimizer_runs  = 200

remappings = [
    "forge-std/=lib/forge-std/src/",
    "openzeppelin/=lib/openzeppelin-contracts/contracts/"
]

# Show function names in stack traces
verbosity = 2

[profile.ci]
fuzz = { runs = 1000 }

# See https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md
